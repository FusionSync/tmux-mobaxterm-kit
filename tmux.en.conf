# tmux-mobaxterm-kit
#
# English tmux configuration tuned for MobaXterm.
# - Right click opens a tmux menu for pane/window/session actions.
# - Shift + mouse selection stays available for MobaXterm native copy.
# - Shift + wheel scrolls tmux history faster.
#
# Recommended tmux version: 3.2 or newer.

set -g mouse on
set -g history-limit 100000
setw -g mode-keys vi

# Let tmux integrate with the system clipboard when the terminal supports OSC 52.
set -s set-clipboard on
set -as terminal-features ',xterm*:clipboard'

# Copy mode: mouse selection and fast scrolling.
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi WheelUpPane send-keys -X -N 10 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 10 scroll-down
bind-key -T copy-mode-vi S-WheelUpPane send-keys -X -N 25 scroll-up
bind-key -T copy-mode-vi S-WheelDownPane send-keys -X -N 25 scroll-down

# Wheel scrolling: browse tmux history from the pane.
bind-key -T root WheelUpPane if-shell -F "#{pane_in_mode}" "send-keys -X -N 10 scroll-up" "copy-mode -e; send-keys -X -N 10 scroll-up"
bind-key -T root WheelDownPane if-shell -F "#{pane_in_mode}" "send-keys -X -N 10 scroll-down" "send-keys -M"

# Shift + wheel: faster tmux scrollback navigation.
bind-key -T root S-WheelUpPane if-shell -F "#{pane_in_mode}" "send-keys -X -N 25 scroll-up" "copy-mode -e; send-keys -X -N 25 scroll-up"
bind-key -T root S-WheelDownPane if-shell -F "#{pane_in_mode}" "send-keys -X -N 25 scroll-down" "send-keys -M"

# Right-click menu on panes.
bind-key -T root MouseDown3Pane display-menu -T " tmux menu " -xM -yM \
    "Session: New session"                    S "command-prompt -p \"New session:\" \"new-session -A -s '%%'\"" \
    "Session: Rename session"                 R "command-prompt -I '#S' -p \"Rename session:\" \"rename-session -- '%%'\"" \
    ""                                        "" "" \
    "Window: New window"                      N new-window \
    "Window: Rename window"                   r "command-prompt -I '#W' -p \"Rename window:\" \"rename-window -- '%%'\"" \
    "Window: Choose window"                   w choose-window \
    "Window: Previous window"                 p previous-window \
    "Window: Next window"                     n next-window \
    ""                                        "" "" \
    "Pane: Split left/right"                  v "split-window -h" \
    "Pane: Split top/bottom"                  s "split-window -v" \
    "Pane: Kill current pane"                 x "kill-pane" \
    "Pane: Break pane into window"            b break-pane \
    "Pane: Join pane from window"             j "choose-window 'join-pane -h -s \"%%\"'" \
    "Pane: Move up"                           < "swap-pane -U" \
    "Pane: Move down"                         > "swap-pane -D" \
    "Pane: #{?window_zoomed_flag,Unzoom,Zoom}" z "resize-pane -Z" \
    ""                                        "" "" \
    "View: Copy mode"                         c "copy-mode" \
    "View: Clear history"                     C "clear-history" \
    "View: Respawn pane"                      P "respawn-pane -k" \
    "View: Respawn window"                    W "respawn-window -k" \
    ""                                        "" "" \
    "Layout: Even horizontal"                 h "select-layout even-horizontal" \
    "Layout: Even vertical"                   l "select-layout even-vertical" \
    "Layout: Main horizontal"                 H "select-layout main-horizontal" \
    "Layout: Main vertical"                   L "select-layout main-vertical" \
    "Layout: Tiled"                           t "select-layout tiled"
