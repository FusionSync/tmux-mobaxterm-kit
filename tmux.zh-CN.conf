# tmux-mobaxterm-kit
#
# 为 MobaXterm 优化的中文 tmux 配置。
# - 右键打开 tmux 菜单，快速操作会话、窗口和面板。
# - Shift + 鼠标拖拽保留 MobaXterm 原生选中复制。
# - Shift + 滚轮快速滚动 tmux 历史内容。
#
# 推荐 tmux 版本：3.2 或更新版本。

set -g mouse on
set -g history-limit 100000
setw -g mode-keys vi

# 当终端支持 OSC 52 时，让 tmux 尝试集成系统剪贴板。
set -s set-clipboard on
set -as terminal-features ',xterm*:clipboard'

# 复制模式：鼠标选择和快速滚动。
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi WheelUpPane send-keys -X -N 10 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 10 scroll-down
bind-key -T copy-mode-vi S-WheelUpPane send-keys -X -N 25 scroll-up
bind-key -T copy-mode-vi S-WheelDownPane send-keys -X -N 25 scroll-down

# 鼠标滚轮：进入复制模式并浏览 tmux 历史内容。
bind-key -T root WheelUpPane if-shell -F "#{pane_in_mode}" "send-keys -X -N 10 scroll-up" "copy-mode -e; send-keys -X -N 10 scroll-up"
bind-key -T root WheelDownPane if-shell -F "#{pane_in_mode}" "send-keys -X -N 10 scroll-down" "send-keys -M"

# Shift + 滚轮：更快地浏览 tmux 历史内容。
bind-key -T root S-WheelUpPane if-shell -F "#{pane_in_mode}" "send-keys -X -N 25 scroll-up" "copy-mode -e; send-keys -X -N 25 scroll-up"
bind-key -T root S-WheelDownPane if-shell -F "#{pane_in_mode}" "send-keys -X -N 25 scroll-down" "send-keys -M"

# 面板右键菜单。
bind-key -T root MouseDown3Pane display-menu -T " tmux 菜单 " -xM -yM \
    "会话: 新建会话"                      S "command-prompt -p \"新建会话:\" \"new-session -A -s '%%'\"" \
    "会话: 重命名会话"                    R "command-prompt -I '#S' -p \"重命名会话:\" \"rename-session -- '%%'\"" \
    ""                                   "" "" \
    "窗口: 新建窗口"                      N new-window \
    "窗口: 重命名窗口"                    r "command-prompt -I '#W' -p \"重命名窗口:\" \"rename-window -- '%%'\"" \
    "窗口: 选择窗口"                      w choose-window \
    "窗口: 上一个窗口"                    p previous-window \
    "窗口: 下一个窗口"                    n next-window \
    ""                                   "" "" \
    "面板: 左右分屏"                      v "split-window -h" \
    "面板: 上下分屏"                      s "split-window -v" \
    "面板: 关闭当前面板"                  x "kill-pane" \
    "面板: 拆出面板"                      b break-pane \
    "面板: 合并面板"                      j "choose-window 'join-pane -h -s \"%%\"'" \
    "面板: 上移"                          < "swap-pane -U" \
    "面板: 下移"                          > "swap-pane -D" \
    "面板: #{?window_zoomed_flag,取消最大化,最大化}" z "resize-pane -Z" \
    ""                                   "" "" \
    "视图: 复制模式"                      c "copy-mode" \
    "视图: 清空历史"                      C "clear-history" \
    "视图: 重启面板"                      P "respawn-pane -k" \
    "视图: 重启窗口"                      W "respawn-window -k" \
    ""                                   "" "" \
    "布局: 水平均分"                      h "select-layout even-horizontal" \
    "布局: 垂直均分"                      l "select-layout even-vertical" \
    "布局: 主面板在上"                    H "select-layout main-horizontal" \
    "布局: 主面板在左"                    L "select-layout main-vertical" \
    "布局: 平铺"                          t "select-layout tiled"
